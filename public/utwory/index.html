<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Utwory | OYL</title>
  <meta name="description" content="Najnowsze utwory Young Olek z YouTube w osobnej zakładce OYL.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="/assets/logo.png">
  <link rel="stylesheet" href="/assets/styles.css">
</head>
<body data-page="utwory">
  <div class="noise" aria-hidden="true"></div>

  <header class="site-header">
    <a class="logo" href="/" aria-label="OYL - strona główna">
      <img class="logo-image" src="/assets/logo.png" alt="OYL logo">
      <span class="logo-text">Olek's Young Label</span>
    </a>

    <nav class="site-nav" aria-label="Główna nawigacja">
      <a href="/o-nas/">O nas</a>
      <a href="/artysci/">Artyści</a>
      <a href="/utwory/">Utwory</a>
      <a href="/premiery/">Premiery</a>
      <a href="/kontakt/">Kontakt</a>
    </nav>
  </header>

  <main>
    <section class="page-hero section">
      <div class="section-heading reveal is-visible">
        <p class="eyebrow">Utwory</p>
        <h3>Najnowsze utwory członków wytwórni OYL</h3>
        <p class="hero-text">
          Tutaj pojawiają się najświeższe publikacje i najmocniejsze numery Young Olek na YouTube.
        </p>
      </div>
    </section>

    <section class="section">
      <div class="section-heading reveal is-visible">
        <p class="eyebrow">YouTube</p>
        <h2 data-tracks-title>Najnowsze</h2>
      </div>

      <div class="track-switcher reveal is-visible" role="tablist" aria-label="Filtr utworów">
        <button class="track-switch is-active" type="button" role="tab" aria-selected="true" data-track-switch="latest">Najnowsze</button>
        <button class="track-switch" type="button" role="tab" aria-selected="false" data-track-switch="popular">Najpopularniejsze</button>
      </div>

      <div
        class="track-grid"
        data-latest-tracks
        data-tracks-limit="3"
        data-tracks-mode="latest"
        data-latest-link="https://www.youtube.com/@Young_Olek"
        data-popular-link="https://www.youtube.com/@Young_Olek/videos?view=0&sort=p&flow=grid"
        channel="https://www.youtube.com/@Young_Olek"
      >
        <article class="track-card reveal is-visible">
          <span class="artist-tag">Loading</span>
          <h3>Ładuję posty...</h3>
        </article>
      </div>

      <div class="hero-actions">
        <a class="button button-secondary" href="https://www.youtube.com/@Young_Olek" target="_blank" rel="noreferrer" data-tracks-more>Zobacz więcej</a>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <p>(c) <span id="year"></span> OYL / Olek's Young Label</p>
  </footer>

  <script src="/assets/scripts.js"></script>
</body>
</html>
